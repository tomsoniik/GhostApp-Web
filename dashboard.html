<!doctype html>
<html lang="pl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARmessage | Terminal Zarządzania</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet">
</head>

<body class="relative min-h-screen selection:bg-primary/30 selection:text-primary overflow-hidden">
  <!-- Security Overlay (Visible until JS auth confirms) -->
  <div id="auth-overlay" class="fixed inset-0 z-50 bg-background flex flex-col items-center justify-center">
    <div class="w-12 h-12 border-t-2 border-primary rounded-full animate-spin"></div>
    <p class="mt-4 font-mono text-xs text-zinc-500 uppercase tracking-widest">Weryfikacja tokenu...</p>
  </div>

  <!-- Background layers -->
  <div class="fixed inset-0 bg-grid opacity-10 pointer-events-none z-[-1]"></div>

  <div class="flex h-screen animate-fade-in" style="opacity: 0;" id="app-content">

    <!-- Sidebar -->
    <aside class="w-64 border-r border-white/5 bg-black/40 backdrop-blur-xl flex flex-col relative z-20">
      <div class="p-6">
        <div class="font-mono text-xl font-bold tracking-tighter text-white flex items-center gap-2">
          <div class="w-2 h-2 bg-primary rounded-sm shadow-[0_0_8px_#ccff00]"></div>
          AR<span class="text-zinc-500">message</span>
        </div>
      </div>

      <nav class="flex-1 px-4 space-y-2">
        <button
          class="w-full flex items-center gap-3 px-3 py-2 rounded-lg bg-white/5 text-white text-sm font-medium border border-white/10 transition-colors">
          <svg class="w-4 h-4 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
          </svg>
          Dziennik Zdarzeń
        </button>
        <button
          class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-zinc-400 hover:text-white hover:bg-white/5 text-sm font-medium transition-colors">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          Reguły Auto-Respondera
        </button>
        <button
          class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-zinc-400 hover:text-white hover:bg-white/5 text-sm font-medium transition-colors">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
          </svg>
          Aktywne Węzły
        </button>
      </nav>

      <div class="p-4 border-t border-white/5">
        <button id="logout-btn"
          class="w-full flex items-center justify-center gap-2 px-3 py-2 rounded border border-red-500/20 text-red-500/80 hover:text-red-400 hover:bg-red-500/10 transition-colors text-xs font-mono">
          Wyloguj (Zniszcz Sesję)
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col relative z-10">
      <!-- Topbar -->
      <header class="h-16 border-b border-white/5 flex items-center px-8 justify-between bg-black/20 backdrop-blur-md">
        <h1 class="text-xl font-display font-bold text-white">Dziennik Zdarzeń (Inbox)</h1>
        <div class="flex items-center gap-3">
          <div
            class="px-2 py-1 bg-green-500/10 border border-green-500/20 rounded text-xs font-mono text-green-400 flex items-center gap-1.5">
            <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
            Daemon Aktywny
          </div>
          <div
            class="w-8 h-8 rounded bg-zinc-800 border border-white/10 flex items-center justify-center text-xs text-white font-mono">
            AD
          </div>
        </div>
      </header>

      <!-- Log Content -->
      <div class="flex-1 p-8 overflow-y-auto">
        <!-- Stats Row -->
        <div class="grid grid-cols-3 gap-6 mb-8">
          <div class="glass-panel p-5">
            <p class="text-xs font-mono text-zinc-500 mb-1">Dzisiejsze Akcje</p>
            <p class="text-3xl font-display text-white">124</p>
          </div>
          <div class="glass-panel p-5">
            <p class="text-xs font-mono text-zinc-500 mb-1">Skuteczność Auto-odpowiedzi</p>
            <p class="text-3xl font-display text-primary">98.5%</p>
          </div>
          <div class="glass-panel p-5 flex flex-col justify-center">
            <div class="flex justify-between items-center text-sm">
              <span class="text-zinc-400">Discord</span>
              <span class="text-discord font-bold">Połączony</span>
            </div>
            <div class="flex justify-between items-center text-sm mt-2">
              <span class="text-zinc-400">Steam</span>
              <span class="text-steamLight font-bold">Połączony</span>
            </div>
          </div>
        </div>

        <!-- Message Logs -->
        <div class="glass-panel overflow-hidden">
          <div class="px-6 py-4 border-b border-white/5 bg-white/2">
            <h3 class="text-sm font-medium text-white">Ostatnie Interwencje</h3>
          </div>
          <div class="divide-y divide-white/5" id="log-container">
            <!-- MOCK LOGS injected via JS -->
          </div>
        </div>
      </div>
    </main>

  </div>

  <script type="module" src="/src/dashboard.ts"></script>
</body>

</html>
